<script type="module">

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

const ROWH = 32, LABELH = 42, COLW = 84, PAD = 30;
const PALETTE = ['#ff9ebb','#7db8ef','#f5cf5a','#7ed9ab','#b79aef','#f5a86a','#5fc9d1','#e79ad0'];
const ANIM_DURATION_MS = 1600;

function uid(){ return Math.random().toString(36).slice(2,10); }
function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function toast(msg){
  const wrap=document.getElementById('toastWrap');
  const d=document.createElement('div');
  d.className='toast'; d.textContent=msg;
  wrap.appendChild(d);
  setTimeout(()=>{ d.style.opacity='0'; d.style.transition='opacity .3s'; setTimeout(()=>d.remove(),300); },2200);
}
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function getRoomCodeFromURL(){ return new URLSearchParams(location.search).get('room')?.toUpperCase()||null; }
function buildShareURL(code){ return `${location.origin}${location.pathname}?room=${code}`; }

function normalizeRoom(val){
  if(!val) return val;
  val.participants = val.participants || [];
  val.items        = val.items        || [];
  val.rungs        = val.rungs        || [];
  val.rows         = val.rows         || 10;
  return val;
}
async function getRoom(code){
  try{ const snap=await get(ref(db,'rooms/'+code)); return snap.exists()?normalizeRoom(snap.val()):null; }
  catch(e){ console.error(e); return null; }
}
async function setRoom(code,obj){
  try{ await fbSet(ref(db,'rooms/'+code),obj); return true; }
  catch(e){ console.error(e); return false; }
}

function getIdentity(code){
  try{ const v=localStorage.getItem('amida-me:'+code); return v?JSON.parse(v):null; } catch(e){ return null; }
}
function setIdentity(code,obj){
  try{ localStorage.setItem('amida-me:'+code,JSON.stringify(obj)); } catch(e){}
}

let presenceRef=null, presenceCountUnsub=null;
function stopPresence(){
  if(presenceRef) remove(presenceRef).catch(()=>{});
  presenceRef=null;
  if(presenceCountUnsub){ presenceCountUnsub(); presenceCountUnsub=null; }
}
function startPresence(code){
  stopPresence();
  const sessId=uid();
  presenceRef=ref(db,`rooms/${code}/presence/${sessId}`);
  onValue(ref(db,'.info/connected'),(snap)=>{
    if(!snap.val()) return;
    fbSet(presenceRef,{joinedAt:Date.now()});

  });

    const el=document.getElementById('presenceCount');
    if(el) el.textContent=`${count}人が閲覧中`;
  });
  presenceCountUnsub=()=>off(pRef,'value',handler);
}

let roomRef=null, roomListener=null;
function stopPoll(){
  if(roomRef&&roomListener) off(roomRef,'value',roomListener);
  roomRef=null; roomListener=null;
}
function startPoll(){
  stopPoll();
  if(!S.code) return;
  roomRef=ref(db,'rooms/'+S.code);
  roomListener=onValue(roomRef,(snapshot)=>{
    if(!snapshot.exists()) return;
    const fresh=normalizeRoom(snapshot.val());
    const changed=JSON.stringify(fresh)!==JSON.stringify(S.room);
    S.room=fresh;
    if(changed&&S.screen==='room') updateRoomDynamic();
  });
}

const S={ screen:'home', code:null, myId:null, myName:null, isViewer:false, room:null };
const app=document.getElementById('app');

function buildRungMap(rungs){
  const m={};
  (rungs||[]).forEach(({row,col})=>{ if(!m[row]) m[row]=new Set(); m[row].add(col); });
  return m;
}
function colX(i){ return PAD+i*COLW+COLW/2; }

function addDefaultRungs(room,col){
  const DEFAULT_COUNT=3; let tries=0, avail=[];
  while(avail.length<DEFAULT_COUNT&&tries<6){
    const byRow=buildRungMap(room.rungs); avail=[];
    for(let r=0;r<room.rows;r++){
      const s=byRow[r];
      if(!s||!(s.has(col-1)||s.has(col)||s.has(col+1))) avail.push(r);
    }
    if(avail.length<DEFAULT_COUNT) room.rows+=4;
    tries++;
  }
  shuffle(avail).slice(0,DEFAULT_COUNT).sort((a,b)=>a-b).forEach(r=>room.rungs.push({row:r,col}));
}

function addRandomRung(room){
  const n=room.participants.length; if(n<2) return false;
  let tries=0, avail=[];
  while(avail.length===0&&tries<6){
    const byRow=buildRungMap(room.rungs); avail=[];
    for(let r=0;r<room.rows;r++){
      const s=byRow[r];
      for(let c=0;c<n-1;c++){
        if(!s||!(s.has(c-1)||s.has(c)||s.has(c+1))) avail.push({row:r,col:c});
      }
    }
    if(avail.length===0) room.rows+=4;
    tries++;
  }
  if(avail.length===0) return false;
  room.rungs.push(avail[Math.floor(Math.random()*avail.length)]);
  return true;
}

function tracePath(startCol,byRow,rows){
  let cur=startCol; const segs=[];
  let prevX=colX(cur), prevY=LABELH;
  for(let r=0;r<rows;r++){
    const s=byRow[r]; let next=cur;
    const midY=LABELH+(r+0.5)*ROWH, botY=LABELH+(r+1)*ROWH;
    segs.push({x1:prevX,y1:prevY,x2:prevX,y2:midY}); prevX=colX(cur); prevY=midY;
    if(s){ if(s.has(cur-1)) next=cur-1; else if(s.has(cur)) next=cur+1; }
    if(next!==cur){ segs.push({x1:colX(cur),y1:midY,x2:colX(next),y2:midY}); prevX=colX(next); prevY=midY; }
    segs.push({x1:prevX,y1:prevY,x2:prevX,y2:botY}); prevX=colX(next); prevY=botY;
    cur=next;
  }
  return {segs,dest:cur};
}

function buildPathSampler(segs){
  const lengths=[]; let total=0;
  segs.forEach(({x1,y1,x2,y2})=>{ total+=Math.hypot(x2-x1,y2-y1); lengths.push(total); });
  return {
    total,
    sampleAt(dist){
      const d=Math.max(0,Math.min(dist,total));
      for(let i=0;i<segs.length;i++){
        if(d<=lengths[i]){
          const prev=i===0?0:lengths[i-1];
          const t=(d-prev)/(lengths[i]-prev);
          const {x1,y1,x2,y2}=segs[i];
          return {x:x1+(x2-x1)*t,y:y1+(y2-y1)*t};
        }
      }
      const l=segs[segs.length-1]; return {x:l.x2,y:l.y2};
    }
  };
}

// ── SVGの実ピクセル幅を計算して返す ──────────────────────────────
function ladderWidth(numCols){ return PAD*2+numCols*COLW; }
function ladderHeight(rows){ return LABELH*2+rows*ROWH; }

function ladderSVG({numCols,names,items,rungs,rows,interactive}){
  const w=ladderWidth(numCols), h=ladderHeight(rows);
  const byRow=buildRungMap(rungs);
  let svg=`<svg id="ladderSvg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<defs><filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter></defs>`;
  for(let c=0;c<numCols;c++){
    const vc=PALETTE[c%PALETTE.length];
    svg+=`<line x1="${colX(c)}" y1="${LABELH}" x2="${colX(c)}" y2="${LABELH+rows*ROWH}" stroke="${vc}" stroke-width="5" stroke-linecap="round" opacity="0.35"/>`;
    svg+=`<text class="name-lbl" x="${colX(c)}" y="${LABELH-14}" text-anchor="middle" fill="${vc}">${esc(names[c]||'')}</text>`;
    if(items) svg+=`<text class="item-lbl" x="${colX(c)}" y="${LABELH+rows*ROWH+26}" text-anchor="middle">${esc(items[c]||'')}</text>`;
  }
  for(let r=0;r<rows;r++){
    const s=byRow[r]; if(!s) continue;
    s.forEach(c=>{
      const y=LABELH+(r+0.5)*ROWH;
      svg+=`<line x1="${colX(c)}" y1="${y}" x2="${colX(c+1)}" y2="${y}" stroke="#a8e6df" stroke-width="5" stroke-linecap="round" opacity="0.35"/>`;
    });
  }
  if(interactive){
    for(let r=0;r<rows;r++){
      for(let c=0;c<numCols-1;c++){
        svg+=`<rect class="rung-hit" data-row="${r}" data-col="${c}" x="${colX(c)}" y="${LABELH+r*ROWH}" width="${COLW}" height="${ROWH}" rx="2"></rect>`;
      }
    }
  }
  svg+=`</svg>`;
  return svg;
}

function animateLadderResult(names,items,rungs,rows){
  const byRow=buildRungMap(rungs);
  const svgEl=document.getElementById('ladderSvg');
  if(!svgEl) return;
  const svgNS='http://www.w3.org/2000/svg';
  const destinations=[];
  const allPaths=names.map((_,c)=>tracePath(c,byRow,rows));
  allPaths.forEach(({dest})=>destinations.push(dest));
  const startTime=performance.now();
  names.forEach((name,c)=>{
    const color=PALETTE[c%PALETTE.length];
    const {segs}=allPaths[c];
    const sampler=buildPathSampler(segs);
    const glowLine=document.createElementNS(svgNS,'polyline');
    glowLine.setAttribute('fill','none');
    glowLine.setAttribute('stroke',color);
    glowLine.setAttribute('stroke-width','5');
    glowLine.setAttribute('stroke-linecap','round');
    glowLine.setAttribute('stroke-linejoin','round');
    glowLine.setAttribute('filter','url(#glowFilter)');
    glowLine.setAttribute('opacity','0.9');
    svgEl.appendChild(glowLine);
    const ball=document.createElementNS(svgNS,'circle');
    ball.setAttribute('r','8');
    ball.setAttribute('fill',color);
    ball.setAttribute('filter','url(#glowFilter)');
    ball.setAttribute('stroke','#fff');
    ball.setAttribute('stroke-width','2');
    svgEl.appendChild(ball);
    function frame(now){
      const elapsed=now-startTime;
      const progress=Math.min(elapsed/ANIM_DURATION_MS,1);
      const eased=progress<0.5?2*progress*progress:1-Math.pow(-2*progress+2,2)/2;
      const dist=eased*sampler.total;
      const pos=sampler.sampleAt(dist);
      ball.setAttribute('cx',pos.x); ball.setAttribute('cy',pos.y);
      const steps=Math.max(2,Math.ceil(120*eased));
      const pts=[];
      for(let i=0;i<=steps;i++){
        const p=sampler.sampleAt((i/steps)*dist);
        pts.push(`${p.x},${p.y}`);
      }
      glowLine.setAttribute('points',pts.join(' '));
      if(progress<1){ requestAnimationFrame(frame); }
      else{ ball.setAttribute('r','11'); ball.setAttribute('stroke-width','3'); }
    }
    requestAnimationFrame(frame);
  });
  setTimeout(()=>{
    const list=document.getElementById('resultList');
    if(!list) return;
    list.innerHTML=names.map((n,c)=>`
      <div class="result-row">
        <span class="who" style="color:${PALETTE[c%PALETTE.length]}">${esc(n)}</span>
        <span class="arrow">→</span>
        <span class="prize">${esc(items[destinations[c]]||'')}</span>
      </div>`).join('');
    list.classList.add('show');
  },ANIM_DURATION_MS+200);
}

// ── 項目セクション描画 ───────────────────────────────────────────
function renderItemsSection(room, isAdmin){
  const wrap=document.getElementById('itemsWrap');
  if(!wrap) return;
  const count=room.participants.length;

  if(count===0){
    wrap.innerHTML=`<p class="small-muted">参加者を追加すると項目の入力欄が表示されます。</p>`;
    return;
  }

  if(room.started||!isAdmin){
    wrap.innerHTML=`
      <ul class="ilist">
        ${room.items.map((it,i)=>`
          <li>
            <span class="small-muted" style="font-family:'JetBrains Mono',monospace;font-size:11px;min-width:20px;">${i+1}</span>
            <span style="font-weight:500;">${esc(it.name||'（未入力）')}</span>
          </li>`).join('')}
      </ul>
      ${!isAdmin?`<p class="small-muted" style="margin-top:10px;">項目の編集は管理者のみ行えます。</p>`:''}`;
    return;
  }

  // 管理者 + 未開始：インライン入力（参加者数分）
  const displayItems=Array.from({length:count},(_,i)=>room.items[i]||{id:uid(),name:''});

  wrap.innerHTML=`
    <div class="item-input-list" id="itemInputList">
      ${displayItems.map((it,i)=>`
        <div class="item-input-row">
          <span class="item-index">${i+1}</span>
          <input
            type="text"
            class="item-field"
            data-idx="${i}"
            data-itemid="${it.id}"
            value="${esc(it.name||'')}"
            placeholder="項目 ${i+1} を入力..."
            maxlength="20">
          <span class="item-saved" id="saved-${i}">✓</span>
        </div>`).join('')}
    </div>
    <p class="small-muted" style="margin-top:12px;">全 ${count} 件の項目を入力すると開始できます。</p>
  `;

  const fields=wrap.querySelectorAll('.item-field');

  const showSaved=(idx)=>{
    const el=document.getElementById(`saved-${idx}`);
    if(!el) return;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),1500);
  };

  const saveField=async(inp)=>{
    const idx=parseInt(inp.dataset.idx);
    const itemId=inp.dataset.itemid;
    const val=inp.value.trim();
    const fresh=await getRoom(S.code);
    if(!fresh) return;
    const pCount=fresh.participants.length;
    while(fresh.items.length<pCount) fresh.items.push({id:uid(),name:''});
    fresh.items=fresh.items.slice(0,pCount);
    const target=fresh.items.find(it=>it.id===itemId)||fresh.items[idx];
    if(target) target.name=val;
    await setRoom(S.code,fresh);
    S.room=fresh;
    showSaved(idx);
    updateStartCard(fresh,true);
  };

  fields.forEach((inp,i)=>{
    inp.addEventListener('blur',()=>saveField(inp));
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        // 次の欄へ遷移。最後の欄ならそのままsave
        if(i<fields.length-1){
          saveField(inp);
          fields[i+1].focus();
        } else {
          inp.blur();
        }
      }
    });
  });
}

// ── 開始カードのみ更新 ───────────────────────────────────────────
function updateStartCard(room,isAdmin){
  const startWrap=document.getElementById('startCardWrap');
  if(!startWrap) return;
  if(room.started){ startWrap.innerHTML=''; return; }
  if(!isAdmin){
    startWrap.innerHTML=`
      <h2 class="sec"><span class="num">04</span>開始</h2>
      <p class="lead">管理者があみだくじを開始するのをお待ちください。</p>`;
    return;
  }
  const count=room.participants.length;
  const filledCount=room.items.slice(0,count).filter(it=>it.name&&it.name.trim()!=='').length;
  const allFilled=count>=2&&filledCount===count;
  startWrap.innerHTML=`
    <h2 class="sec"><span class="num">04</span>開始</h2>
    <p class="lead">参加者 <b>${count}人</b>・項目 <b>${filledCount}/${count}件</b> 入力済み
      ${allFilled?'':`<br><span style="color:#a15a4a;font-weight:700;">※ 参加者を2人以上追加し、全員分の項目を入力してください</span>`}
    </p>
    <button class="btn btn-primary" id="startBtn" ${allFilled?'':'disabled'}>あみだくじを開始する</button>`;
  const sb=document.getElementById('startBtn');
  if(sb) sb.onclick=async()=>{
    const fresh=await getRoom(S.code);
    const ok=fresh.participants.length>=2
      &&fresh.items.length>=fresh.participants.length
      &&fresh.items.slice(0,fresh.participants.length).every(it=>it.name&&it.name.trim()!=='');
    if(!ok){ toast('参加者と項目を確認してください'); S.room=fresh; updateRoomDynamic(); return; }
    fresh.started=true;
    fresh.columnOrder=shuffle(fresh.participants.map(p=>p.id));
    const pidToItemName={};
    fresh.participants.forEach((p,i)=>{ pidToItemName[p.id]=(fresh.items[i]||{}).name||''; });
    fresh.itemOrder=fresh.columnOrder.map(id=>pidToItemName[id]);
    await setRoom(S.code,fresh);
    S.room=fresh; updateRoomDynamic();
  };
}

// ── 部屋画面：動的更新 ──────────────────────────────────────────
function updateRoomDynamic(){
  const room=S.room; if(!room) return;
  const isAdmin=(room.adminId===S.myId);
  const numCols=room.participants.length;

  const bannerWrap=document.getElementById('statusBannerWrap');
  if(bannerWrap){
    bannerWrap.innerHTML=room.started
      ?`<div class="status-banner">
          <div class="dotmark"></div>
          <div style="flex:1;">
            <div class="txt">あみだくじが開始されました</div>
            <div class="sub">下の「あみだくじ」欄で結果を確認できます。</div>
          </div>
        </div>`:'' ;
  }

  // 参加者リスト
  const pList=document.getElementById('participantList');
  if(pList){
    pList.innerHTML=room.participants.map(p=>{
      const tags=[];
      if(p.id===room.adminId) tags.push('<span class="badge badge-admin">管理者</span>');
      if(p.id===S.myId) tags.push('<span class="badge badge-you">あなた</span>');
      const delBtn=isAdmin&&!room.started&&p.id!==room.adminId
        ?`<button class="btn-danger btn" data-delp="${p.id}" style="padding:3px 9px;font-size:12px;">削除</button>`:'';
      return `<li>${esc(p.name)} ${tags.join(' ')}${delBtn}</li>`;
    }).join('')||'<li class="small-muted">まだ誰も参加していません</li>';
    if(isAdmin&&!room.started){
      pList.querySelectorAll('[data-delp]').forEach(btn=>{
        btn.onclick=async()=>{
          const fresh=await getRoom(S.code);
          const idx=fresh.participants.findIndex(p=>p.id===btn.dataset.delp);
          if(idx!==-1){
            fresh.participants.splice(idx,1);
            if(fresh.items.length>idx) fresh.items.splice(idx,1);
          }
          const maxCol=fresh.participants.length-2;
          fresh.rungs=maxCol>=0?fresh.rungs.filter(r=>r.col<=maxCol):[];
          await setRoom(S.code,fresh);
          S.room=fresh; updateRoomDynamic();
        };
      });
    }
  }

  // 参加者追加フォーム（管理者・未開始）
  // ※ フォーカスを項目欄に遷移させない：addP後はaddPInputにフォーカスを戻す
  const addPWrap=document.getElementById('addParticipantWrap');
  if(addPWrap){
    if(isAdmin&&!room.started){
      if(!addPWrap.dataset.built){
        addPWrap.dataset.built='1';
        addPWrap.innerHTML=`
          <div class="add-participant-form">
            <div class="col"><input type="text" id="addPInput" placeholder="追加する参加者の名前" maxlength="20"></div>
            <button class="btn btn-secondary" id="addPBtn">＋ 追加</button>
          </div>`;
        const pInp=document.getElementById('addPInput');
        const addP=async()=>{
          const name=pInp.value.trim();
          if(!name){ toast('名前を入力してください'); return; }
          const fresh=await getRoom(S.code);
          if(fresh.started){ toast('開始後は追加できません'); return; }
          const id=uid();
          fresh.participants.push({id,name});
          fresh.items.push({id:uid(),name:''});
          const newIndex=fresh.participants.length-1;
          if(newIndex>=1) addDefaultRungs(fresh,newIndex-1);
          await setRoom(S.code,fresh);
          S.room=fresh; pInp.value='';
          updateRoomDynamic();
          // フォーカスは参加者入力欄に戻す（項目欄には遷移しない）
          const nextInp=document.getElementById('addPInput');
          if(nextInp) nextInp.focus();
        };
        document.getElementById('addPBtn').onclick=addP;
        pInp.addEventListener('keydown',e=>{ if(e.key==='Enter') addP(); });
      }
    } else {
      addPWrap.innerHTML='';
      addPWrap.dataset.built='';
    }
  }

  // 項目セクション
  renderItemsSection(room,isAdmin);

  // ラダー説明
  const ladderLead=document.getElementById('ladderLead');
  if(ladderLead){
    ladderLead.textContent=room.started
      ?'列の並びと項目はランダムに決定されています。アニメーションで経路を確認してください。'
      :'マス目をクリックするか、ボタンを押すと横棒を追加できます（管理者のみ）。列の並びは開始時にランダムに入れ替わります。';
  }
  const ladderEditControls=document.getElementById('ladderEditControls');
  if(ladderEditControls) ladderEditControls.style.display=room.started?'none':'flex';

  // ラダー描画
  const gridWrapInner=document.getElementById('gridWrapInner');
  if(gridWrapInner){
    if(numCols<2&&!room.started){
      gridWrapInner.innerHTML=`<p class="small-muted" style="padding:8px 0;">参加者が2人以上になるとあみだくじを編集できます。</p>`;
      gridWrapInner.dataset.mode='';
    } else if(!room.started){
      gridWrapInner.dataset.mode='';
      gridWrapInner.innerHTML=ladderSVG({
        numCols,names:room.participants.map(p=>p.name),items:null,
        rungs:room.rungs,rows:room.rows,interactive:isAdmin
      });
      if(isAdmin){
        gridWrapInner.querySelectorAll('.rung-hit').forEach(rect=>{
          rect.onclick=async()=>{
            const row=parseInt(rect.dataset.row),col=parseInt(rect.dataset.col);
            const fresh=await getRoom(S.code);
            const byRow=buildRungMap(fresh.rungs);
            const set=byRow[row]||new Set();
            const exists=fresh.rungs.some(r=>r.row===row&&r.col===col);
            if(exists){
              fresh.rungs=fresh.rungs.filter(r=>!(r.row===row&&r.col===col));
            } else {
              if(set.has(col-1)||set.has(col)||set.has(col+1)){ toast('隣接するマスには横棒を置けません'); return; }
              fresh.rungs.push({row,col});
            }
            await setRoom(S.code,fresh);
            S.room=fresh; updateRoomDynamic();
          };
        });
      }
    } else {
      // 開始後：結果表示
      const nameById={};
      room.participants.forEach(p=>nameById[p.id]=p.name);
      const names=room.columnOrder.map(id=>nameById[id]||'?');
      const items=room.itemOrder;
      const key=`started:${JSON.stringify(room.columnOrder)}:${JSON.stringify(room.itemOrder)}:${JSON.stringify(room.rungs)}:${room.rows}`;
      if(gridWrapInner.dataset.mode!==key){
        gridWrapInner.dataset.mode=key;

        // SVGの実ピクセル幅をresultCaptureの幅として設定
        const svgW=ladderWidth(numCols);
        const svgH=ladderHeight(room.rows);

        // resultCapture を SVG 幅に固定し、result-list もその幅に揃える
        gridWrapInner.innerHTML=`
          <div class="result-capture-center" style="width:100%;">
            <div id="resultCapture" style="
              display:inline-block;
              background:var(--bg);
              padding:16px;
              border-radius:4px;
              width:${svgW+32}px;
            ">
              ${ladderSVG({numCols,names,items,rungs:room.rungs,rows:room.rows,interactive:false})}
              <div class="result-list" id="resultList" style="width:${svgW}px;"></div>
            </div>
          </div>`;

        setTimeout(()=>animateLadderResult(names,items,room.rungs,room.rows),80);

        setTimeout(()=>{
          const capture=document.getElementById('resultCapture');
          if(!capture) return;
          // result-actions は resultCapture の外に出して通常フローで表示
          const actionsDiv=document.createElement('div');
          actionsDiv.className='result-actions';
          actionsDiv.style.justifyContent='center';
          actionsDiv.style.marginTop='16px';
          actionsDiv.innerHTML=`
            <button class="btn btn-ghost" id="saveImgBtn">📷 画像で保存</button>
            ${isAdmin?`<button class="btn btn-danger" id="redrawBtn">🔄 再抽選</button>`:''}`;
          // gridWrapInner の後ろに挿入（card の中）
          const ladderCard=gridWrapInner.closest('.card');
          if(ladderCard) ladderCard.appendChild(actionsDiv);
          document.getElementById('saveImgBtn').onclick=saveResultImage;
          if(isAdmin){
            document.getElementById('redrawBtn').onclick=async()=>{
              if(!confirm('再抽選しますか？現在の結果がリセットされます。')) return;
              const fresh=await getRoom(S.code);
              fresh.started=false; fresh.columnOrder=null; fresh.itemOrder=null;
              await setRoom(S.code,fresh);
              S.room=fresh; updateRoomDynamic();
            };
          }
        },ANIM_DURATION_MS+400);
      }
    }
  }

  const rowLbl=document.getElementById('rowCountLbl');
  if(rowLbl) rowLbl.textContent=`現在 ${room.rows} 段`;

  const addRungBtn=document.getElementById('addRandomRungBtn');
  if(addRungBtn){
    addRungBtn.disabled=room.started||numCols<2||!isAdmin;
    addRungBtn.onclick=async()=>{
      const fresh=await getRoom(S.code);
      if(!addRandomRung(fresh)){ toast('これ以上追加できる場所がありません'); return; }
      await setRoom(S.code,fresh);
      S.room=fresh; updateRoomDynamic();
    };
  }
  const addRowBtn=document.getElementById('addRowBtn');
  if(addRowBtn){
    addRowBtn.disabled=room.started||!isAdmin;
    addRowBtn.onclick=async()=>{
      const fresh=await getRoom(S.code);
      fresh.rows=(fresh.rows||10)+2;
      await setRoom(S.code,fresh);
      S.room=fresh; updateRoomDynamic();
    };
  }

  updateStartCard(room,isAdmin);
}

const urlCode=getRoomCodeFromURL();
if(urlCode){ renderJoinCode(urlCode); }
else{ renderHome(); }
</script>
</body>
</html>
